<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover"
  />

  <title>BEER VISTA TAP MENU</title>

  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      min-height: 100%;
      background: #111;
      overflow-x: hidden;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue",
        "Segoe UI", Roboto, "Noto Sans JP", sans-serif;
    }

    body {
      color: #fff;
    }

    .app {
      width: 100%;
      min-height: 100vh;
      background: #111;
      overflow-x: hidden;
    }

    .header {
      position: sticky;
      top: 0;
      z-index: 10;
      width: 100%;
      padding: 10px 14px;
      background: rgba(17, 17, 17, 0.92);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    }

    .header-title {
      margin: 0;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.04em;
      line-height: 1.4;
    }

    .header-sub {
      margin: 2px 0 0;
      font-size: 11px;
      color: #aaa;
      line-height: 1.4;
    }

    .sheet-section {
      width: 100%;
      overflow: hidden;
      background: #111;
    }

    /*
      Googleスプレッドシートの公開HTMLはPC幅で描画されやすいため、
      iframe全体をスマホ幅に合わせて縮小表示します。

      表示が小さい場合は 1200 → 1000 → 900 のように下げてください。
    */
    .sheet-scale-wrap {
      --sheet-width: 1200;
      --sheet-height: 14000;
      --scale: calc(100vw / var(--sheet-width));

      width: calc(var(--sheet-width) * 1px);
      height: calc(var(--sheet-height) * 1px);

      transform: scale(var(--scale));
      transform-origin: top left;
      background: #fff;
    }

    .sheet-section {
      height: calc(14000px * (100vw / 1200));
    }

    .sheet-frame {
      display: block;
      width: 1200px;
      height: 14000px;
      border: 0;
      background: #fff;
    }

    /*
      タブレット・PCではスマホプレビュー幅に固定。
      QRコードやSNSリンクから開いたときの見た目を一定にします。
    */
    @media (min-width: 520px) {
      .app {
        max-width: 430px;
        margin: 0 auto;
        box-shadow: 0 0 40px rgba(0, 0, 0, 0.35);
      }

      .sheet-scale-wrap {
        --scale: calc(430 / var(--sheet-width));
      }

      .sheet-section {
        height: calc(14000px * (430 / 1200));
      }
    }

    /*
      Instagram内ブラウザなどで高さ計算が不安定な場合の保険。
      画面下に余白を少し足して、最下部が隠れにくくします。
    */
    .bottom-space {
      height: env(safe-area-inset-bottom);
      min-height: 24px;
      background: #111;
    }
  </style>
</head>

<body>
  <main class="app">
    <header class="header">
      <h1 class="header-title">BEER VISTA TAP MENU</h1>
      <p class="header-sub">Scroll to view the menu</p>
    </header>

    <section class="sheet-section" aria-label="Tap menu">
      <div class="sheet-scale-wrap">
        <iframe
          class="sheet-frame"
          src="https://docs.google.com/spreadsheets/d/e/2PACX-1vRCU8XLZMT2yBGxs1sQxz1NmSaX5fhDGPFDFMwrbSLWl3mnvWwRjhAIpxTTbRC98dQcNVeZH8QjazkN/pubhtml?gid=1218865702&single=true&widget=false&headers=false&chrome=false"
          loading="eager"
        ></iframe>
      </div>
    </section>

    <div class="bottom-space"></div>
  </main>
</body>
</html>
