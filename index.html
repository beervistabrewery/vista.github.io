<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1024, user-scalable=yes">
  <title>スプレッドシート表示</title>
  <style>
    /* Flexboxを解除し、純粋なブロックレイアウトにすることでスマホでの左見切れを防ぎます */
    body {
      margin: 0;
      padding: 0;
      background-color: #ffffff;
    }
    
    .sheet-wrapper {
      /* % ではなく px で固定幅を指定することが最重要です。これによりiframeの内部スクロールを防ぎ、画像を埋め込んだようにブラウザ全体が縮小されます。 */
      width: 1024px;
      margin: 0 auto; /* PC閲覧時などのための中央寄せ */
      height: 100vh;
      height: 100dvh;
    }
    iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }
  </style>
</head>
<body>
  <div class="sheet-wrapper">
    <iframe 
      id="spreadsheet-frame" 
      src="https://docs.google.com/spreadsheets/d/1paBnR8fgU0v_Gz5J96F5S5EnFHNQ2qzNvC3H1e_k4tY/htmlembed?gid=1218865702&single=true&widget=false&chrome=false">
    </iframe>
  </div>
  <script>
    const iframe = document.getElementById('spreadsheet-frame');
    const REFRESH_INTERVAL = 5 * 60 * 1000;
    setInterval(() => {
      try {
        const currentUrl = new URL(iframe.src, window.location.href);
        currentUrl.searchParams.set('timestamp', new Date().getTime());
        iframe.src = currentUrl.toString();
      } catch (error) {
        console.error("更新エラー:", error);
      }
    }, REFRESH_INTERVAL);
  </script>
</body>
</html>
