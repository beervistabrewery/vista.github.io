<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>スプレッドシート表示</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #f4f5f7;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: sans-serif;
    }
    
    .sheet-wrapper {
      width: 95%;
      max-width: 1200px;
      height: 85vh;
      background-color: #ffffff;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
      border-radius: 8px;
      overflow: hidden;
    }
    iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }
    
  </style>
</head>
<body>
  
  <div class="sheet-wrapper">
    <!-- 指定されたシートのみを表示するためのパラメータを設定しています -->
    <iframe 
      id="spreadsheet-frame" 
      src="https://docs.google.com/spreadsheets/d/1paBnR8fgU0v_Gz5J96F5S5EnFHNQ2qzNvC3H1e_k4tY/htmlembed?gid=1218865702&single=true&widget=false&chrome=false">
    </iframe>
  </div>
</body>
</html>
