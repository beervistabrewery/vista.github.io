<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=620, user-scalable=yes">
  <title>スプレッドシート表示</title>
  <style>
    :root {
      /* 
       * 【横幅の調整】
       * スプレッドシートのメニュー表の「実際のピクセル幅」を指定します。
       * 調査の結果、実際のメニュー表幅は約600px〜620pxでした。
       * ここを620pxに絞ることで無駄な余白がなくなり、スマホ画面への初期表示がジャストサイズになります。
       * もし右端が少し切れたり、余白が多すぎる場合はこの数値を増減してください。
       */
      --sheet-width: 620px;
      
      /* 
       * 【縦幅の調整】
       * メニューの一番下まで十分に見える高さを指定します。
       */
      --sheet-height: 1600px;
    }
    body {
      margin: 0;
      padding: 0;
      background-color: #ffffff;
    }
    
    .sheet-wrapper {
      width: var(--sheet-width);
      margin: 0 auto; 
      height: var(--sheet-height);
    }
    iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
      /* 非常に重要：iframeへの指のタッチ判定を無効化し、1枚の画像としてのピンチ操作・縦スクロールを可能にします */
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div class="sheet-wrapper">
    <iframe 
      id="spreadsheet-frame" 
      src="https://docs.google.com/spreadsheets/d/1paBnR8fgU0v_Gz5J96F5S5EnFHNQ2qzNvC3H1e_k4tY/htmlembed?gid=1218865702&single=true&widget=false&chrome=false">
    </iframe>
  </div>
  <script>
    // CSSの --sheet-width の設定値を取得し、スマホの Viewport（縮小倍率）に自動反映させます
    // これにより、ユーザーはCSSの変数を1箇所直すだけで、スマホ画面にピタッと揃うようになります
    document.addEventListener("DOMContentLoaded", () => {
      const style = getComputedStyle(document.documentElement);
      const sheetWidth = style.getPropertyValue('--sheet-width').replace('px', '').trim() || '620';
      const viewportMeta = document.querySelector('meta[name="viewport"]');
      if (viewportMeta) {
        viewportMeta.setAttribute('content', `width=${sheetWidth}, user-scalable=yes`);
      }
    });
    // スプレッドシートの自動更新処理
    const iframe = document.getElementById('spreadsheet-frame');
    const REFRESH_INTERVAL = 5 * 60 * 1000;
    setInterval(() => {
      try {
        const currentUrl = new URL(iframe.src, window.location.href);
        currentUrl.searchParams.set('timestamp', new Date().getTime());
        iframe.src = currentUrl.toString();
      } catch (error) {
        console.error("更新エラー:", error);
      }
    }, REFRESH_INTERVAL);
  </script>
</body>
</html>
